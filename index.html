<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <!-- Diagnostic Error Logger Overlay -->
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      const div = document.createElement('div');
      div.style.position = 'fixed';
      div.style.top = '0';
      div.style.left = '0';
      div.style.width = '100vw';
      div.style.height = '100vh';
      div.style.backgroundColor = '#0f172a';
      div.style.color = '#f8fafc';
      div.style.padding = '32px';
      div.style.fontFamily = 'monospace';
      div.style.zIndex = '999999';
      div.style.overflow = 'auto';
      div.innerHTML = '<h2 style="color:#ef4444;margin-bottom:16px;">🚨 Runtime Error Detected</h2>' +
                      '<p><strong>Message:</strong> ' + message + '</p>' +
                      '<p><strong>File:</strong> ' + source + '</p>' +
                      '<p><strong>Line:</strong> ' + lineno + ':' + colno + '</p>' +
                      '<pre style="background:#1e293b;padding:16px;border-radius:8px;margin-top:16px;overflow:auto;white-space:pre-wrap;">' + (error ? error.stack : 'No stack trace available') + '</pre>';
      document.documentElement.appendChild(div);
      return false;
    };
  </script>

  <style>
    .direction-pad {
      display: grid;
      grid-template-columns: repeat(3, 40px);
      gap: 8px;
      max-width: fit-content;
      margin-top: 8px;
      background: rgba(15, 23, 42, 0.4);
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }
    .dir-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: 6px;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.12s ease;
      outline: none;
    }
    .dir-btn:hover {
      background: var(--border-color);
      border-color: #6366f1;
    }
    .dir-btn.active {
      background: #4f46e5;
      border-color: #6366f1;
      color: #ffffff;
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.35);
    }
    .dir-pad-center {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 15px;
      width: 40px;
      height: 40px;
    }
    .direction-label {
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      font-family: var(--font-mono);
    }
    .hud-divider {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.1);
      margin: 0 4px;
    }
  </style>
</head>

          <div class="viewport-hud">
            <button class="hud-btn" id="btn-zoom-in" title="Zoom In">+</button>
            <button class="hud-btn" id="btn-zoom-out" title="Zoom Out">−</button>
            <span class="hud-text" id="txt-zoom">250%</span>
            <div class="hud-divider"></div>
            <button class="hud-btn" id="btn-grid-toggle" title="Toggle Grid">⯁</button>
            <button class="hud-btn" id="btn-skeleton-toggle" title="Toggle Skeleton">☷</button>
            <button class="hud-btn" id="btn-reset-cam" title="Reset Camera">⌖</button>
          </div>
        </div>

        <!-- Timeline & Scrubber Panel -->
        <div class="timeline-panel">
          <div class="timeline-row">
            <div class="animation-selector-wrapper">
              <label for="select-anim" class="sr-only">Animation</label>
              <select id="select-anim">
                <option value="idle">Idle</option>
                <option value="walk">Walk</option>
                <option value="run">Run</option>
                <option value="jump">Jump</option>
                <option value="attack">Attack</option>
                <option value="hurt">Hurt</option>
                <option value="die">Die</option>
              </select>
            </div>

            <div class="attack-style-container" id="attack-style-container" style="display: none;">
              <label for="select-attack-style" class="sr-only">Attack Style</label>
              <select id="select-attack-style">
                <option value="melee">Melee</option>
                <option value="ranged">Ranged</option>
                <option value="archer">Archer</option>
              </select>
            </div>

            <div class="scrubber-wrapper">
              <span class="time-label">Frame</span>
              <input type="range" id="animation-scrubber" min="0" max="60" value="0" class="time-slider">
              <span class="time-indicator" id="txt-frame-index">0/60</span>
            </div>

            <div class="playback-controls">
              <button class="btn btn-round" id="btn-play-pause" title="Play/Pause">
                <span class="play-icon">▶</span>
              </button>
            </div>

            <div class="speed-control">
              <label for="slider-speed">Speed</label>
              <input type="range" id="slider-speed" min="0.1" max="3" step="0.1" value="1.0" class="speed-slider">
              <span class="speed-indicator" id="txt-speed">1.0x</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Right Panel: Export & Config -->
      <aside class="panel sidebar-right" id="sidebar-right">
        <div class="sidebar-resizer sidebar-resizer-right" id="resizer-right"></div>
        <div class="panel-header">
          <h2>Export & Config</h2>
        </div>
        <div class="panel-body">
          <div class="control-group">
            <label>Layout</label>
            <select id="select-export-layout">
              <option value="horizontal">Horizontal Strip</option>
              <option value="grid">Grid (4x4)</option>
              <option value="vertical">Vertical Strip</option>
            </select>
          </div>

          <div class="control-group">
            <label>Frame Size</label>
            <select id="select-frame-size">
              <option value="64">64×64</option>
              <option value="128" selected>128×128</option>
              <option value="256">256×256</option>
              <option value="512">512×512</option>
            </select>
          </div>

          <div class="control-group">
            <label>Frame Count <span class="slider-val" id="txt-frame-count">8 frames</span></label>
            <input type="range" id="slider-frame-count" min="1" max="60" step="1" value="8" class="value-slider">
          </div>

          <div class="control-group">
            <label>Padding <span class="slider-val" id="txt-padding">2 px</span></label>
            <input type="range" id="slider-padding" min="0" max="20" step="1" value="2" class="value-slider">
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="check-include-shadow" checked>
            <label for="check-include-shadow">Include Shadow</label>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="check-bake-arrow" checked>
            <label for="check-bake-arrow" title="Uncheck to leave the arrow out of the sprites. Its position and angle are still exported per frame in the metadata JSON, so your game can draw its own arrow.">Bake Arrow Into Sprites</label>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="check-export-atlas">
            <label for="check-export-atlas">Export LibGDX Atlas</label>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="check-export-metadata" checked>
            <label for="check-export-metadata">Export Metadata JSON</label>
          </div>

          <div class="divider"></div>

          <div class="export-preview-container">
            <label>Spritesheet Preview</label>
            <div class="preview-box">
              <canvas id="export-preview-canvas"></canvas>
            </div>
            <div class="info-text" id="export-dimensions">Resolution: —</div>
          </div>

          <button class="btn btn-primary btn-glow btn-full" id="btn-export-png">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
            Export Spritesheet PNG
          </button>
          <button class="btn btn-secondary btn-full" id="btn-export-frame">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1"></path></svg>
            Export Current Frame
          </button>

          <div class="divider"></div>

          <div class="control-group">
            <label for="import-json">Import / Export Config</label>
            <div style="display: flex; gap: 8px;">
              <label for="import-json" class="btn btn-secondary btn-full">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                Import JSON
              </label>
              <input type="file" id="import-json" accept=".json" style="display: none;">
              <button id="export-json" class="btn btn-secondary btn-full">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Export JSON
              </button>
            </div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <!-- Loading scripts as ES modules -->
  <script type="module" src="src/app.js?v=24"></script>
</body>
</html>
